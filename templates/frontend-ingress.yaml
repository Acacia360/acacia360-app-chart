# Frontend Ingress
{{- if .Values.frontend.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "acacia360-app-chart.fullname" . }}-frontend-ingress
  labels:
    {{- include "acacia360-app-chart.labels" . | nindent 4 }}
    app: acacia360-frontend
  annotations:
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "http://192.168.1.135:8085,http://acacia360.local,http://192.168.1.135:80"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, Accept"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "false"
spec:
  ingressClassName: {{ .Values.frontend.ingress.className }}
  rules:
    - http:
        paths:
          - path: {{ .Values.frontend.ingress.path }}
            pathType: {{ .Values.frontend.ingress.pathType }}
            backend:
              service:
                name: {{ include "acacia360-app-chart.fullname" . }}-frontend-service
                port:
                  number: {{ .Values.frontend.service.port }}

          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: {{ include "acacia360-app-chart.fullname" . }}-gateway-service
                port:
                  number: {{ .Values.gateway.service.port }}

{{- end }}